        <g transform="translate(0, 1) scale(1.0)">
          <path d="M-10,0 C-10,-8 -5,-12 3,-12 C8,-12 12,-8 12,-2 C12,4 7,8 5,9 C3,10 1,11 -1,11 C-5,11 -10,6 -10,0 Z" fill="#336791" />
          <path d="M-12,5 C-12,2 -9,2 -8,4 C-9,5 -10,7 -12,5 Z" fill="#FFFFFF"/>
          <path d="M4,-12 C1,-12 -2,-7 -2,-2 C-2,3 1,6 4,6 C7,6 9,3 9,-2 C9,-7 7,-12 4,-12 Z" fill="#2C5980" />
          <circle cx="-1.5" cy="-4.5" r="1.2" fill="#FFF" />
          <path d="M-10,0 C-12,1 -14,3 -14,6 C-14,9 -12,10 -10,9 C-9,8.5 -8,8 -8,6" fill="none" stroke="#336791" stroke-width="2.5" stroke-linecap="round"/>
        </g>
      </g>
    </g>
  </g>

  <!-- MongoDB Icon (7) -->
  <g transform="translate(458, 265)">
    <g class="icon-group g-7">
      <g class="icon-content">
        <rect class="icon-bg" x="-24" y="-24" width="48" height="48" rx="12" />
        <g transform="scale(1.15)">
          <path d="M0,-11 C3,-7 6,-3 6,2 C6,6 3,9 0,11 Z" fill="#47A248" />
          <path d="M0,-11 C-3,-7 -6,-3 -6,2 C-6,6 -3,9 0,11 Z" fill="#13AA52" />
          <path d="M0,-11 C-0.5,-7 -1,-3 -1,2 C-1,6 -0.5,9 0,11 C0.5,9 1,6 1,2 C1,-3 0.5,-7 0,-11" fill="#3F3F3F" opacity="0.3" />
          <path d="M0,-11 L0,11" stroke="#3F3F3F" stroke-width="0.8" opacity="0.4" />
        </g>
      </g>
    </g>
  </g>

  <!-- Git Icon (8) -->
  <g transform="translate(516, 265)">
    <g class="icon-group g-8">
      <g class="icon-content">
        <rect class="icon-bg" x="-24" y="-24" width="48" height="48" rx="12" />
        <g transform="scale(1.1)">
          <rect x="-9" y="-9" width="18" height="18" rx="2.5" fill="#F05032" transform="rotate(45)" />
          <path d="M-2,5.5 L-2,-4 M-2,0 Q0.5,-2 3,-2" stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" fill="none" />
          <circle cx="-2" cy="5.5" r="2" fill="#FFFFFF" />
          <circle cx="-2" cy="-4" r="2" fill="#FFFFFF" />
          <circle cx="3" cy="-2" r="2" fill="#FFFFFF" />
        </g>
      </g>
    </g>
  </g>

  <!-- Figma Icon (9) -->
  <g transform="translate(574, 265)">
    <g class="icon-group g-9">
      <g class="icon-content">
        <rect class="icon-bg" x="-24" y="-24" width="48" height="48" rx="12" />
        <g transform="scale(0.95)">
          <path d="M-9,-9 a4.5,4.5 0 0,1 4.5,-4.5 h4.5 v9 h-4.5 a4.5,4.5 0 0,1 -4.5,-4.5 z" fill="#F24E1E" />
          <circle cx="2.25" cy="-9" r="4.5" fill="#FF7262" />
          <path d="M-9,0 a4.5,4.5 0 0,1 4.5,-4.5 h4.5 v9 h-4.5 a4.5,4.5 0 0,1 -4.5,-4.5 z" fill="#A259FF" />
          <circle cx="2.25" cy="0" r="4.5" fill="#1ABC9C" />
          <path d="M-9,9 a4.5,4.5 0 0,1 4.5,-4.5 h4.5 v4.5 a4.5,4.5 0 0,1 -4.5,4.5 a4.5,4.5 0 0,1 -4.5,-4.5 z" fill="#0ACF83" />
        </g>
      </g>
    </g>
  </g>

  <!-- Google Ads Icon (10) -->
  <g transform="translate(632, 265)">
    <g class="icon-group g-10">
      <g class="icon-content">
        <rect class="icon-bg" x="-24" y="-24" width="48" height="48" rx="12" />
        <g transform="scale(0.11) translate(-123, -112)">
          <path fill="#3C8BD9" d="M85.9,28.6c2.4-6.3,5.7-12.1,10.6-16.8c19.6-19.1,52-14.3,65.3,9.7c10,18.2,20.6,36,30.9,54c17.2,29.9,34.6,59.8,51.6,89.8c14.3,25.1-1.2,56.8-29.6,61.1c-17.4,2.6-33.7-5.4-42.7-21c-15.1-26.3-30.3-52.6-45.4-78.8c-0.3-0.6-0.7-1.1-1.1-1.6c-1.6-1.3-2.3-3.2-3.3-4.9c-6.7-11.8-13.6-23.5-20.3-35.2c-4.3-7.6-8.8-15.1-13.1-22.7c-3.9-6.8-5.7-14.2-5.5-22C83.6,36.2,84.1,32.2,85.9,28.6"/>
          <path fill="#FABC04" d="M85.9,28.6c-0.9,3.6-1.7,7.2-1.9,11c-0.3,8.4,1.8,16.2,6,23.5C101,82,112,101,122.9,120c1,1.7,1.8,3.4,2.8,5c-6,10.4-12,20.7-18.1,31.1c-8.4,14.5-16.8,29.1-25.3,43.6c-0.4,0-0.5-0.2-0.6-0.5c-0.1-0.8,0.2-1.5,0.4-2.3c4.1-15,0.7-28.3-9.6-39.7c-6.3-6.9-14.3-10.8-23.5-12.1c-12-1.7-22.6,1.4-32.1,8.9c-1.7,1.3-2.8,3.2-4.8,4.2c-0.4,0-0.6-0.2-0.7-0.5c4.8-8.3,9.5-16.6,14.3-24.9C45.5,98.4,65.3,64,85.2,29.7C85.4,29.3,85.7,29,85.9,28.6"/>
