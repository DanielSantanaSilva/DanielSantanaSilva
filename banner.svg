<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="350">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07090e" />
      <stop offset="50%" stop-color="#0f1422" />
      <stop offset="100%" stop-color="#181125" />
    </linearGradient>

    <!-- Name/Text Gradient -->
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="35%" stop-color="#4FACFE" />
      <stop offset="70%" stop-color="#A259FF" />
      <stop offset="100%" stop-color="#F355DA" />
    </linearGradient>

    <!-- Meta Gradient -->
    <linearGradient id="meta-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0064E0" />
      <stop offset="60%" stop-color="#0080FF" />
      <stop offset="100%" stop-color="#00F2FE" />
    </linearGradient>

    <!-- Fading Line Gradient -->
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0" />
      <stop offset="15%" stop-color="#1e293b" stop-opacity="0.65" />
      <stop offset="85%" stop-color="#1e293b" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle Icon Glow -->
    <filter id="icon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    /* Background Elements */
    .bg { fill: url(#bg-grad); }
    
    /* Nodes and Circuit Path Animation */
    .network-path {
      stroke: url(#line-grad);
      stroke-width: 1.2;
      stroke-dasharray: 8,4;
      animation: dash 30s linear infinite;
    }
    @keyframes dash {
      to { stroke-dashoffset: -360; }
    }

    .network-node {
      fill: #1e293b;
      animation: node-pulse 4s ease-in-out infinite alternate;
    }
    .node-glow {
      fill: #4FACFE;
      opacity: 0.25;
      animation: node-pulse 3s ease-in-out infinite alternate;
    }
    @keyframes node-pulse {
      0% { opacity: 0.15; transform: scale(0.9); }
      100% { opacity: 0.45; transform: scale(1.15); }
    }

    /* Floating Particles */
    .particle {
      fill: #4FACFE;
      opacity: 0.3;
      animation: float-particle 12s linear infinite;
    }
    .particle-pink {
      fill: #F355DA;
    }
    .p-1 { animation-duration: 10s; animation-delay: 0s; }
    .p-2 { animation-duration: 14s; animation-delay: -3s; }
    .p-3 { animation-duration: 8s; animation-delay: -5s; }
    .p-4 { animation-duration: 16s; animation-delay: -2s; }
    
    @keyframes float-particle {
      0% { transform: translateY(370px) translateX(0); opacity: 0; }
      10% { opacity: 0.4; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-20px) translateX(25px); opacity: 0; }
    }

    /* Typography Styles */
    .title-glow {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 50px;
      font-weight: 900;
      letter-spacing: 9px;
      text-anchor: middle;
      fill: url(#title-grad);
      filter: url(#glow);
      animation: glow-breath 3.5s ease-in-out infinite alternate;
    }
    .title-main {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 50px;
      font-weight: 900;
      letter-spacing: 9px;
      text-anchor: middle;
      fill: url(#title-grad);
    }
    @keyframes glow-breath {
      0% { opacity: 0.35; filter: drop-shadow(0 0 5px rgba(0,242,254,0.3)); }
      100% { opacity: 0.9; filter: drop-shadow(0 0 15px rgba(243,85,218,0.7)); }
    }

    .subtitle {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13.5px;
      font-weight: 600;
      letter-spacing: 7px;
      fill: #8E9BB0;
      text-anchor: middle;
      animation: fadeIn 2s ease-out;
    }

    /* Floating bobbing applied to inner group */
    .icon-group {
      animation: float-icon 4.2s ease-in-out infinite;
    }
    @keyframes float-icon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    /* Staggered bobbing delay */
    .g-1 { animation-delay: 0.0s; }
    .g-2 { animation-delay: 0.3s; }
    .g-3 { animation-delay: 0.6s; }
    .g-4 { animation-delay: 0.9s; }
    .g-5 { animation-delay: 1.2s; }
    .g-6 { animation-delay: 1.5s; }
    .g-7 { animation-delay: 1.8s; }
    .g-8 { animation-delay: 2.1s; }
    .g-9 { animation-delay: 2.4s; }
    .g-10 { animation-delay: 2.7s; }
    .g-11 { animation-delay: 3.0s; }

    /* Centered hover scale for innermost group */
    .icon-content {
      transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform-origin: 0px 0px;
    }
    .icon-group:hover {
      cursor: pointer;
    }
    .icon-group:hover .icon-content {
      transform: scale(1.15);
    }
    .icon-group:hover .icon-bg {
      stroke: #4FACFE;
      fill: #1C2333;
      filter: url(#icon-glow);
    }
    .icon-bg {
      fill: #111520;
      stroke: #262E40;
      stroke-width: 1.5;
      transition: all 0.3s ease;
    }
  </style>

  <!-- Solid background covering the entire viewBox -->
  <rect x="-10" y="-10" width="820" height="370" class="bg" />

  <!-- Network Circuit Lines (Fade out at borders using linear gradient stroke) -->
  <g fill="none">
    <path class="network-path" d="M -50,60 L 150,40 L 220,110 L 120,190 L 320,210 L 400,120 L 520,200 L 680,120 L 720,40 L 850,70" />
    <path class="network-path" d="M 50,300 L 140,240 L 280,260 L 350,150 L 480,110 L 590,240 L 750,290" />
  </g>

  <!-- Animated Network Nodes -->
  <g>
    <circle cx="150" cy="40" r="3" class="network-node" />
    <circle cx="150" cy="40" r="7" class="node-glow" />
    
    <circle cx="220" cy="110" r="3" class="network-node" />
    
    <circle cx="400" cy="120" r="4" class="network-node" />
    <circle cx="400" cy="120" r="9" class="node-glow" />
    
    <circle cx="680" cy="120" r="3" class="network-node" />
    
    <circle cx="720" cy="40" r="3.5" class="network-node" />
    <circle cx="720" cy="40" r="8" class="node-glow" />

    <circle cx="350" cy="150" r="3" class="network-node" />
    <circle cx="480" cy="110" r="3" class="network-node" />
  </g>

  <!-- Floating Particles in Background -->
  <circle cx="180" cy="0" r="2.5" class="particle p-1" />
  <circle cx="280" cy="0" r="1.5" class="particle p-2" />
  <circle cx="580" cy="0" r="3" class="particle particle-pink p-3" />
  <circle cx="680" cy="0" r="2" class="particle p-4" />
  <circle cx="110" cy="0" r="2" class="particle particle-pink p-2" />
  <circle cx="490" cy="0" r="1.5" class="particle p-1" />

  <!-- Centered Name and Glowing Text -->
  <g transform="translate(0, 10)">
    <text class="title-glow" x="400" y="130">DANIEL SANTANA</text>
    <text class="title-main" x="400" y="130">DANIEL SANTANA</text>
    <text class="subtitle" x="400" y="175">DEVELOPER &amp; MARKETING SPECIALIST</text>
  </g>

  <!-- ==================== ICONS ROW ==================== -->
  
  <!-- JS Icon (1) -->
  <g transform="translate(110, 265)">
    <g class="icon-group g-1">
      <g class="icon-content">
        <rect class="icon-bg" x="-24" y="-24" width="48" height="48" rx="12" />
        <rect x="-13" y="-13" width="26" height="26" rx="2" fill="#F7DF1E" />
        <text x="10" y="10" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="11" fill="#000" text-anchor="end">JS</text>
      </g>
    </g>
  </g>

  <!-- TS Icon (2) -->
  <g transform="translate(168, 265)">
    <g class="icon-group g-2">
      <g class="icon-content">
        <rect class="icon-bg" x="-24" y="-24" width="48" height="48" rx="12" />
        <rect x="-13" y="-13" width="26" height="26" rx="2" fill="#3178C6" />
        <text x="10" y="10" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="11" fill="#FFF" text-anchor="end">TS</text>
      </g>
    </g>
  </g>

  <!-- React Icon (3) -->
  <g transform="translate(226, 265)">
    <g class="icon-group g-3">
      <g class="icon-content">
        <rect class="icon-bg" x="-24" y="-24" width="48" height="48" rx="12" />
        <g stroke="#61DAFB" stroke-width="1.5" fill="none" transform="scale(1.2)">
          <ellipse rx="10" ry="3.8" />
          <ellipse rx="10" ry="3.8" transform="rotate(60)" />
          <ellipse rx="10" ry="3.8" transform="rotate(120)" />
          <circle r="1.8" fill="#61DAFB" stroke="none" />
