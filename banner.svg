        <rect class="icon-bg" x="-24" y="-24" width="48" height="48" rx="12" />
        <g transform="scale(1.1)">
          <circle r="12" fill="#000" stroke="#444" stroke-width="0.8" />
          <path d="M-4.5,5 L-4.5,-5 L3.2,4.4 M3.2,-5 L3.2,5" stroke="#FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        </g>
      </g>
    </g>
  </g>

  <!-- Node.js Icon (5) -->
  <g transform="translate(342, 265)">
    <g class="icon-group g-5">
      <g class="icon-content">
        <rect class="icon-bg" x="-24" y="-24" width="48" height="48" rx="12" />
        <g transform="scale(1.1)">
          <path d="M0,-12 L10.4,-6 L10.4,6 L0,12 L-10.4,6 L-10.4,-6 Z" fill="#339933" />
          <path d="M0,-12 L0,12 M0,0 L10.4,-6 M-10.4,-6 L0,0" stroke="#FFF" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.6" />
        </g>
      </g>
    </g>
  </g>

  <!-- PostgreSQL Icon (6) -->
  <g transform="translate(400, 265)">
    <g class="icon-group g-6">
      <g class="icon-content">
